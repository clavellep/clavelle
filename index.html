<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Clavelle · Gestión de Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf7f2;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 24px 20px;
            color: #2c2b28;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* HEADER FLORAL MODERNO */
        .header {
            background: linear-gradient(145deg, #ffffff 0%, #fef5ec 100%);
            border-radius: 48px;
            padding: 20px 32px;
            margin-bottom: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid #f0e4d8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-left { display: flex; align-items: center; gap: 18px; }
        .icon-flor {
            background: #f3ede5;
            width: 64px;
            height: 64px;
            border-radius: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: inset 0 1px 2px #fff8, 0 6px 12px rgba(0, 0, 0, 0.02);
        }
        .header-text h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #4a6f5e, #b8876e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-text p {
            font-size: 0.8rem;
            color: #a28d78;
            font-weight: 450;
            margin-top: 4px;
        }
        .tasa-badge {
            background: #eae1d6;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5e4b38;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            color: #8f7b66;
            transition: 0.2s;
        }
        .tab.active {
            background: #6b8c7a;
            color: white;
            box-shadow: 0 4px 12px rgba(87, 117, 96, 0.2);
        }
        .tab:hover:not(.active) { background: #eee5dc; }

        /* PANELES */
        .panel {
            display: none;
            background: white;
            border-radius: 40px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .panel.active { display: block; animation: fade 0.2s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* FORMULARIO */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .campo label {
            font-weight: 500;
            color: #8b735b;
            font-size: 0.75rem;
            letter-spacing: 0.2px;
        }
        .campo input, .campo select, .campo textarea {
            padding: 12px 18px;
            border: 1.5px solid #efe2d6;
            border-radius: 48px;
            font-family: inherit;
            font-size: 0.85rem;
            background: #ffffff;
            transition: 0.2s;
        }
        .campo input:focus, .campo select:focus, .campo textarea:focus {
            outline: none;
            border-color: #b3cfc0;
            box-shadow: 0 0 0 3px rgba(107, 140, 122, 0.1);
        }

        /* BOTONES */
        button {
            background: #6b8c7a;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        button:hover { background: #5b7a68; transform: translateY(-1px); }
        .btn-primary { background: #b8876e; width: 100%; padding: 14px; font-size: 0.9rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .btn-primary:hover { background: #a5735b; }
        .btn-success { background: #83a67c; }
        .btn-success:hover { background: #6d8a66; }
        .btn-danger { background: #cb887a; }
        .btn-danger:hover { background: #bc7464; }
        .btn-warning { background: #e2bc89; color: #4a3a2a; }
        .btn-warning:hover { background: #d6ab72; color: white; }
        .btn-info { background: #99b4aa; }
        .btn-restaurar { background: #c1b09b; }

        /* BADGES */
        .badge-pendiente, .badge-proceso, .badge-entregado, .badge-eliminado {
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-pendiente { background: #ffe6df; color: #bb714c; }
        .badge-proceso { background: #fff0e0; color: #c7883c; }
        .badge-entregado { background: #e3f3e4; color: #517a3e; }
        .badge-eliminado { background: #efebe6; color: #8f7e6e; }

        /* TARJETAS PEDIDO */
        .pedido-item {
            background: #ffffff;
            border: 1px solid #f0e4d8;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .pedido-item:hover {
            border-color: #dfcebe;
            background: #fefcf9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }
        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .pedido-detalle {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            color: #8f7b66;
            background: #fdfbf8;
            padding: 12px;
            border-radius: 28px;
        }
        .pedido-acciones {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
            border-top: 1px solid #f0e4d8;
            padding-top: 16px;
        }
        .entregado-label {
            background: #e3f3e4;
            color: #46643a;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* FILTROS */
        .filtros-fechas, .filtros {
            background: #fdfbf8;
            border-radius: 28px;
            padding: 14px 20px;
            margin-bottom: 24px;
        }
        .grupo-fecha label {
            font-weight: 500;
            font-size: 0.7rem;
            color: #a28d78;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .stat-card {
            background: #fdfbf8;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 1px solid #efe2d6;
        }
        .stat-card .numero { font-size: 2rem; font-weight: 600; color: #4f6b5c; }
        .stat-card .monto { color: #78a07c; font-weight: 500; }

        .toast {
            background: #4a6f5e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            border: none;
            box-shadow: 0 25px 40px rgba(0,0,0,0.08);
        }
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 20px;
            font-size: 0.7rem;
            color: #cdbcab;
            border-top: 1px solid #efe2d6;
        }
        @media (max-width: 640px) {
            body { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="icon-flor">🌿</div>
            <div class="header-text">
                <h1>CLAVELLE</h1>
                <p>Gestión floral de pedidos · trazabilidad elegante</p>
            </div>
        </div>
        <div class="tasa-badge">
            <span>💱</span> <strong id="tasaDisplay">Calculando BCV...</strong>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="mostrarPanel('registro')">📝 Nuevo Pedido</button>
        <button class="tab" onclick="mostrarPanel('control')">🔍 Control</button>
        <button class="tab" onclick="mostrarPanel('estadisticas')">📊 Estadísticas</button>
    </div>

    <!-- REGISTRO -->
    <div id="panel-registro" class="panel active">
        <h2 style="margin-bottom: 20px; font-weight: 500; color:#5e4b38;">🌸 Registrar pedido</h2>
        <div class="form-grid">
            <div class="campo"><label>📋 Número</label><input type="text" id="numeroPedido" readonly style="background:#f8f2ec;"></div>
            <div class="campo"><label>👤 Cliente *</label><input type="text" id="clienteNombre" placeholder="Nombre o código" autocomplete="off"></div>
            <div class="campo"><label>📞 Teléfono</label><input type="text" id="telefono" placeholder="0412-1234567"></div>
            <div class="campo"><label>📦 Descripción *</label><textarea id="descripcion" rows="2" placeholder="Detalles del pedido..."></textarea></div>
            <div class="campo"><label>💰 Monto (Bs) *</label><input type="number" id="monto" step="0.01" placeholder="0.00"></div>
            <div class="campo"><label>📅 Fecha Entrega</label><input type="date" id="fechaEntrega"></div>
            <div class="campo"><label>⏰ Hora Entrega</label><input type="time" id="horaEntrega"></div>
            <div class="campo"><label>📌 Estado Inicial</label>
                <select id="estadoRegistro">
                    <option value="Pendiente">🕊️ Pendiente por hacer</option>
                    <option value="En Proceso">⚙️ Proceso Finalizado</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" onclick="guardarPedido()">💾 GUARDAR PEDIDO</button>
    </div>

    <!-- CONTROL -->
    <div id="panel-control" class="panel">
        <h2 style="margin-bottom: 20px; font-weight: 500;">🔍 Control de pedidos</h2>
        <div class="filtros-fechas" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;">
            <div class="grupo-fecha"><label>📅 Desde</label><input type="date" id="fechaDesde"></div>
            <div class="grupo-fecha"><label>📅 Hasta</label><input type="date" id="fechaHasta"></div>
            <button class="btn-info" onclick="aplicarFiltros()">🔍 Aplicar Fechas</button>
            <button onclick="limpiarFechas()" style="background:#cdc2b6;">🗑️ Limpiar Fechas</button>
        </div>
        <div class="filtros">
            <button onclick="filtrarPor('todos')" id="btnTodos">📋 Todos</button>
            <button onclick="filtrarPor('Pendiente')" id="btnPendiente">🕊️ Pendientes</button>
            <button onclick="filtrarPor('En Proceso')" id="btnProceso">⚙️ Proceso</button>
            <button onclick="filtrarPor('Entregado')" id="btnEntregado">✅ Entregados</button>
            <button onclick="filtrarPor('eliminados')" id="btnEliminados" style="background:#cdc2b6;">🗑️ Eliminados</button>
        </div>
        <div id="indicadoresFiltro" style="margin-bottom: 20px; font-size:0.75rem; color:#a28d78;"></div>
        <div id="listaPedidos"></div>
    </div>

    <!-- ESTADÍSTICAS -->
    <div id="panel-estadisticas" class="panel">
        <h2 style="margin-bottom: 20px; font-weight: 500;">📊 Estadísticas de ventas</h2>
        <div class="filtros-fechas" style="margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
            <div class="grupo-fecha"><label>📅 Desde</label><input type="date" id="statsFechaDesde"></div>
            <div class="grupo-fecha"><label>📅 Hasta</label><input type="date" id="statsFechaHasta"></div>
            <button class="btn-info" onclick="actualizarEstadisticasConFechas()">📊 Actualizar</button>
            <button onclick="limpiarStatsFechas()" style="background:#cdc2b6;">🗑️ Limpiar</button>
        </div>
        <div id="statsContainer" class="stats-grid"></div>
    </div>

    <footer>💐 Clavelle · sincronizado con Google Sheets</footer>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); backdrop-filter:blur(2px); align-items:center; justify-content:center; z-index:1000;">
    <div class="modal-content" style="background:white; max-width:500px; width:90%; border-radius:2rem; padding:1.5rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;"><h3>✏️ Editar Pedido #<span id="editNumero"></span></h3><span onclick="cerrarModal()" style="cursor:pointer; font-size:28px;">&times;</span></div>
        <div class="campo"><label>👤 Cliente</label><input type="text" id="editCliente"></div>
        <div class="campo"><label>📞 Teléfono</label><input type="text" id="editTelefono"></div>
        <div class="campo"><label>📦 Descripción</label><textarea id="editDescripcion" rows="2"></textarea></div>
        <div class="campo"><label>💰 Monto Bs</label><input type="number" id="editMonto" step="0.01"></div>
        <div class="campo"><label>📅 Fecha Entrega</label><input type="date" id="editFechaEntrega"></div>
        <div class="campo"><label>⏰ Hora Entrega</label><input type="time" id="editHoraEntrega"></div>
        <div class="campo"><label>📌 Estado</label><select id="editEstado"><option>Pendiente</option><option>En Proceso</option><option>Entregado</option></select></div>
        <div class="campo"><label>👤 Responsable Entrega</label><input type="text" id="editResponsable"></div>
        <div style="display: flex; gap: 12px; margin-top: 1.5rem;"><button onclick="guardarEdicion()" style="background:#6b8c7a; flex:1">💾 Guardar</button><button onclick="cerrarModal()" style="background:#cdc2b6;">Cancelar</button></div>
    </div>
</div>

<script>
    // ===== CONFIGURACIÓN =====
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzg4gkGCsYmX0Ddp2OfCkKJIhBu7JW9p20_cBWcSLV2yDDVkOgFyMxFjMNE937tYRQxxA/exec";
    const CLAVE_AUTORIZACION = "piliperezbele";
    let USUARIO_ACTUAL = "Pili Pérez";
    let todosLosPedidos = [], filtroActual = "todos", fechaDesde = "", fechaHasta = "", tasaBCV = 489.55, numeroEditando = null;

    function formatearFechaLocal(f) { if(!f) return"—"; let l=String(f).split('T')[0]; if(l.match(/^\d{4}-\d{2}-\d{2}$/)){ let p=l.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; } return l; }
    function formatearHoraLocal(h){ if(!h) return"—"; let c=h.split('T')[1]?.split('.')[0]||h; if(c.includes('am')||c.includes('pm')) return c; let p=c.match(/\d+/g); if(!p) return"—"; let horas=parseInt(p[0])%12||12, mins=p[1]||"00", ampm=parseInt(p[0])>=12?'pm':'am'; return `${horas}:${mins} ${ampm}`; }
    function formatearFechaHoraLocal(fh){ if(!fh) return"—"; if(fh.includes('T')) return `${formatearFechaLocal(fh.split('T')[0])} ${formatearHoraLocal(fh)}`; if(fh.includes(',')){ let pp=fh.split(','); return `${formatearFechaLocal(pp[0].trim())} ${formatearHoraLocal(pp[1].trim())}`; } return fh; }
    function mostrarNotificacion(m,esError=false){ let t=document.createElement('div'); t.className='toast'; t.style.background=esError?'#cb887a':'#6b8c7a'; t.style.position='fixed'; t.style.bottom='20px'; t.style.right='20px'; t.style.zIndex='9999'; t.style.padding='12px 24px'; t.style.borderRadius='60px'; t.style.color='white'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function obtenerTasaBCV(){ try{ let r=await fetch('https://open.er-api.com/v6/latest/USD'); let d=await r.json(); if(d?.rates?.VES) tasaBCV=d.rates.VES; }catch(e){} document.getElementById('tasaDisplay')&&(document.getElementById('tasaDisplay').innerText=tasaBCV.toFixed(2)); return tasaBCV; }
    function jsonpRequest(url){ return new Promise((res,rej)=>{ let cb=`__jsonp_${Date.now()}`; let s=document.createElement('script'); window[cb]=d=>{ delete window[cb]; document.body.removeChild(s); res(d); }; let sep=url.includes('?')?'&':'?'; s.src=`${url}${sep}callback=${cb}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }
    async function leerPedidos(){ try{ let url=`${SCRIPT_URL}?action=leer`; if(filtroActual==='eliminados') url+='&mostrarEliminados=true'; if(fechaDesde) url+=`&fechaDesde=${fechaDesde}`; if(fechaHasta) url+=`&fechaHasta=${fechaHasta}`; let d=await jsonpRequest(url); return d.success?d.pedidos||[]:[]; }catch(e){ mostrarNotificacion("❌ Error de lectura",true); return[]; } }
    async function guardarPedidoWebApp(pd){ return new Promise((res,rej)=>{ let cb=`jsonp_cb_${Date.now()}`; let s=document.createElement('script'); window[cb]=r=>{ delete window[cb]; document.body.removeChild(s); res({success:r.success===true, error:r.error}); }; let p=new URLSearchParams(); p.append('action','guardar'); p.append('data',JSON.stringify(pd)); p.append('callback',cb); s.src=`${SCRIPT_URL}?${p.toString()}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }
    async function actualizarPedidoCompleto(pd){ return new Promise((res,rej)=>{ let cb=`jsonp_cb_${Date.now()}`; let s=document.createElement('script'); window[cb]=r=>{ delete window[cb]; document.body.removeChild(s); res({success:r.success===true, error:r.error}); }; let p=new URLSearchParams(); p.append('action','actualizarCompleto'); p.append('data',JSON.stringify(pd)); p.append('usuario',USUARIO_ACTUAL); p.append('callback',cb); s.src=`${SCRIPT_URL}?${p.toString()}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }
    async function eliminarPedido(num,pass){ return new Promise((res,rej)=>{ let cb=`jsonp_cb_${Date.now()}`; let s=document.createElement('script'); window[cb]=r=>{ delete window[cb]; document.body.removeChild(s); res({success:r.success===true, error:r.error}); }; s.src=`${SCRIPT_URL}?action=eliminar&numero=${num}&password=${encodeURIComponent(pass)}&usuario=${encodeURIComponent(USUARIO_ACTUAL)}&callback=${cb}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }
    async function restaurarPedido(num,pass){ return new Promise((res,rej)=>{ let cb=`jsonp_cb_${Date.now()}`; let s=document.createElement('script'); window[cb]=r=>{ delete window[cb]; document.body.removeChild(s); res({success:r.success===true, error:r.error}); }; s.src=`${SCRIPT_URL}?action=restaurar&numero=${num}&password=${encodeURIComponent(pass)}&usuario=${encodeURIComponent(USUARIO_ACTUAL)}&callback=${cb}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }
    async function actualizarEstadoPedido(num,est,resp){ return new Promise((res,rej)=>{ let cb=`jsonp_cb_${Date.now()}`; let s=document.createElement('script'); window[cb]=r=>{ delete window[cb]; document.body.removeChild(s); res({success:r.success===true, error:r.error}); }; s.src=`${SCRIPT_URL}?action=actualizar&numero=${num}&estado=${encodeURIComponent(est)}&responsable=${encodeURIComponent(resp)}&callback=${cb}`; s.onerror=()=>{ delete window[cb]; document.body.removeChild(s); rej(new Error('Network error')); }; document.body.appendChild(s); }); }

    async function guardarPedido(){ let cl=document.getElementById('clienteNombre').value.trim(), de=document.getElementById('descripcion').value.trim(), m=document.getElementById('monto').value, te=document.getElementById('telefono').value.trim(), fe=document.getElementById('fechaEntrega').value, he=document.getElementById('horaEntrega').value, es=document.getElementById('estadoRegistro').value; if(!cl||!de||!m||isNaN(m)||parseFloat(m)<=0){ mostrarNotificacion("❌ Verifica cliente, descripción y monto",true); return; } let btn=event.target, orig=btn.innerHTML; btn.innerHTML='<span class="loading"></span> Guardando...'; btn.disabled=true; let p=await leerPedidos(); let ult=p.length?Math.max(...p.map(p=>parseInt(p.numero)))+1:1; let montoBs=parseFloat(m), montoUsd=montoBs/tasaBCV; let data={numero:ult, cliente:cl, telefono:te, descripcion:de, monto:montoBs.toFixed(2), fechaEntrega:fe, horaEntrega:he, estado:es, clienteDetalle:"", responsable:"", fechaRegistro:new Date().toISOString().split('T')[0], montoUSD:montoUsd.toFixed(2), observaciones:`Creado por ${USUARIO_ACTUAL}`}; let res=await guardarPedidoWebApp(data); btn.innerHTML=orig; btn.disabled=false; if(res.success){ mostrarNotificacion(`✅ Pedido #${ult} guardado`); document.getElementById('clienteNombre').value=""; document.getElementById('telefono').value=""; document.getElementById('descripcion').value=""; document.getElementById('monto').value=""; document.getElementById('fechaEntrega').value=""; document.getElementById('horaEntrega').value=""; document.getElementById('numeroPedido').value=ult+1; await cargarPedidos(); } else mostrarNotificacion("❌ Error al guardar",true); }

    async function cargarPedidos(){ let cont=document.getElementById('listaPedidos'); if(!cont) return; cont.innerHTML='<div class="empty-state">Cargando...</div>'; todosLosPedidos=await leerPedidos(); if(!todosLosPedidos.length){ cont.innerHTML='<div class="empty-state">No hay pedidos</div>'; actualizarEstadisticas(); return; } let filtrados=todosLosPedidos; if(filtroActual!=="todos" && filtroActual!=="eliminados") filtrados=filtrados.filter(p=>p.estado===filtroActual); filtrados.sort((a,b)=>b.numero-a.numero); if(!filtrados.length){ cont.innerHTML='<div class="empty-state">No hay pedidos con este filtro</div>'; actualizarEstadisticas(); return; } let html=""; for(let p of filtrados){ let badge=p.estado==="Pendiente"?"badge-pendiente":(p.estado==="En Proceso"?"badge-proceso":"badge-entregado"); let usd=(parseFloat(p.monto)/tasaBCV).toFixed(2); let esElim=filtroActual==="eliminados", esEnt=(p.estado==="Entregado"); html+=`<div class="pedido-item"><div class="pedido-header"><div><strong>📋 #${p.numero}</strong> <span class="${badge}">${p.estado}</span></div><div><strong>Bs ${parseFloat(p.monto).toFixed(2)}</strong> <small>($${usd})</small></div></div><div class="pedido-detalle"><div>👤 ${escapeHtml(p.cliente)}</div><div>📞 ${escapeHtml(p.telefono)||"—"}</div><div>📦 ${escapeHtml(p.descripcion)}</div><div>📅 Entrega: ${p.fechaEntrega} ${formatearHoraLocal(p.horaEntrega)}</div><div>📆 Registro: ${p.fechaRegistro}</div>${p.responsable?`<div>👤 Responsable: ${escapeHtml(p.responsable)}</div>`:''}${p.modificadoPor?`<div>✏️ Modificado: ${escapeHtml(p.modificadoPor)} (${p.fechaModificacion})</div>`:''}</div><div class="pedido-acciones">${!esElim&&!esEnt?`<button class="btn-warning" onclick='abrirModalEditar(${JSON.stringify(p).replace(/'/g,"\\'")})'>✏️ Editar</button>`:''}${!esElim&&!esEnt?`<button class="btn-danger" onclick='confirmarEliminar(${p.numero},"${escapeHtml(p.cliente).replace(/'/g,"\\'")}","${p.estado}")'>🗑️ Eliminar</button>`:''}${!esElim&&!esEnt?`<button class="btn-success" onclick="confirmarEntrega(${p.numero}, this)">✅ Marcar Entregado</button>`:''}${esElim?`<button class="btn-restaurar" onclick="confirmarRestaurar(${p.numero},'${escapeHtml(p.cliente).replace(/'/g,"\\'")}')">♻️ Restaurar</button>`:''}${esEnt&&!esElim?`<span class="entregado-label">✅ ENTREGADO - Procesado</span>`:''}</div></div>`; } cont.innerHTML=html; actualizarEstadisticas(); }

    async function confirmarRestaurar(num,cliente){ let pass=prompt(`🔐 Autorización requerida\nRestaurar pedido #${num} - ${cliente}\nContraseña:`); if(!pass||pass!==CLAVE_AUTORIZACION){ mostrarNotificacion("❌ Contraseña incorrecta",true); return; } if(confirm(`¿Restaurar pedido #${num}?`)){ let r=await restaurarPedido(num,pass); if(r.success){ mostrarNotificacion(`♻️ Pedido #${num} restaurado`); cargarPedidos(); } else mostrarNotificacion("❌ Error al restaurar",true); } }
    async function confirmarEntrega(num,el){ let responsable=prompt("✍️ Nombre de quien entrega:"); if(!responsable){ mostrarNotificacion("❌ Nombre requerido",true); return; } let orig=el.innerHTML; el.innerHTML='<span class="loading"></span>'; el.disabled=true; let r=await actualizarEstadoPedido(num,"Entregado",responsable); el.innerHTML=orig; el.disabled=false; if(r.success){ mostrarNotificacion(`✅ Pedido #${num} entregado por ${responsable}`); cargarPedidos(); } else mostrarNotificacion("❌ Error",true); }
    async function confirmarEliminar(num,cliente,estado){ if(estado==="Entregado"){ mostrarNotificacion("❌ No se puede eliminar entregado",true); return; } let pass=prompt(`🔐 Contraseña para eliminar pedido #${num}`); if(!pass||pass!==CLAVE_AUTORIZACION){ mostrarNotificacion("❌ Contraseña incorrecta",true); return; } if(confirm(`¿Eliminar pedido #${num}?`)){ let r=await eliminarPedido(num,pass); if(r.success){ mostrarNotificacion(`🗑️ Pedido #${num} eliminado`); cargarPedidos(); } else mostrarNotificacion("❌ Error",true); } }
    function abrirModalEditar(p){ if(p.estado==="Entregado"){ mostrarNotificacion("❌ No se puede editar un pedido entregado",true); return; } numeroEditando=p.numero; document.getElementById('editNumero').innerText=p.numero; document.getElementById('editCliente').value=p.cliente||""; document.getElementById('editTelefono').value=p.telefono||""; document.getElementById('editDescripcion').value=p.descripcion||""; document.getElementById('editMonto').value=p.monto||""; document.getElementById('editFechaEntrega').value=p.fechaEntrega||""; document.getElementById('editHoraEntrega').value=p.horaEntrega||""; document.getElementById('editEstado').value=p.estado||"Pendiente"; document.getElementById('editResponsable').value=p.responsable||""; document.getElementById('modalEditar').style.display='flex'; }
    function cerrarModal(){ document.getElementById('modalEditar').style.display='none'; numeroEditando=null; }
    async function guardarEdicion(){ if(!numeroEditando) return; let montoBs=parseFloat(document.getElementById('editMonto').value)||0, montoUsd=montoBs/tasaBCV; let data={numero:numeroEditando, cliente:document.getElementById('editCliente').value, telefono:document.getElementById('editTelefono').value, descripcion:document.getElementById('editDescripcion').value, monto:montoBs.toFixed(2), fechaEntrega:document.getElementById('editFechaEntrega').value, horaEntrega:document.getElementById('editHoraEntrega').value, estado:document.getElementById('editEstado').value, responsable:document.getElementById('editResponsable').value, montoUSD:montoUsd.toFixed(2)}; let btn=event.target, orig=btn.innerHTML; btn.innerHTML='<span class="loading"></span> Guardando...'; btn.disabled=true; let r=await actualizarPedidoCompleto(data); btn.innerHTML=orig; btn.disabled=false; if(r.success){ mostrarNotificacion(`✅ Pedido #${numeroEditando} actualizado`); cerrarModal(); cargarPedidos(); } else mostrarNotificacion("❌ Error: "+r.error,true); }

    function actualizarEstadisticas(){ let d=document.getElementById('statsContainer'); if(!d) return; if(!todosLosPedidos.length){ d.innerHTML='<div class="empty-state">Sin datos</div>'; return; } let totalBs=todosLosPedidos.reduce((s,p)=>s+(parseFloat(p.monto)||0),0), totalUsd=totalBs/tasaBCV, pend=todosLosPedidos.filter(p=>p.estado==="Pendiente"), proc=todosLosPedidos.filter(p=>p.estado==="En Proceso"), ent=todosLosPedidos.filter(p=>p.estado==="Entregado"); d.innerHTML=`<div class="stat-card"><h4>📊 Total</h4><div class="numero">${todosLosPedidos.length}</div><div class="monto">Bs ${totalBs.toFixed(2)}</div><div class="monto">$${totalUsd.toFixed(2)}</div></div><div class="stat-card"><h4>🕊️ Pendientes</h4><div class="numero">${pend.length}</div><div class="monto">Bs ${pend.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div><div class="stat-card"><h4>⚙️ Proceso</h4><div class="numero">${proc.length}</div><div class="monto">Bs ${proc.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div><div class="stat-card"><h4>✅ Entregados</h4><div class="numero">${ent.length}</div><div class="monto">Bs ${ent.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div>`; }
    async function actualizarEstadisticasConFechas(){ let fd=document.getElementById('statsFechaDesde').value, fh=document.getElementById('statsFechaHasta').value; let url=`${SCRIPT_URL}?action=leer&mostrarEliminados=false`; if(fd) url+=`&fechaDesde=${fd}`; if(fh) url+=`&fechaHasta=${fh}`; let d=await jsonpRequest(url); let pedidos=d.success?d.pedidos||[]:[]; let statsDiv=document.getElementById('statsContainer'); if(!pedidos.length){ statsDiv.innerHTML='<div class="empty-state">Sin datos en el rango</div>'; return; } let totalBs=pedidos.reduce((s,p)=>s+(parseFloat(p.monto)||0),0), totalUsd=totalBs/tasaBCV, pend=pedidos.filter(p=>p.estado==="Pendiente"), proc=pedidos.filter(p=>p.estado==="En Proceso"), ent=pedidos.filter(p=>p.estado==="Entregado"); statsDiv.innerHTML=`<div class="stat-card"><h4>📊 Total</h4><div class="numero">${pedidos.length}</div><div class="monto">Bs ${totalBs.toFixed(2)}</div><div class="monto">$${totalUsd.toFixed(2)}</div></div><div class="stat-card"><h4>🕊️ Pendientes</h4><div class="numero">${pend.length}</div><div class="monto">Bs ${pend.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div><div class="stat-card"><h4>⚙️ Proceso</h4><div class="numero">${proc.length}</div><div class="monto">Bs ${proc.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div><div class="stat-card"><h4>✅ Entregados</h4><div class="numero">${ent.length}</div><div class="monto">Bs ${ent.reduce((s,p)=>s+(parseFloat(p.monto)||0),0).toFixed(2)}</div></div>`; }
    function limpiarStatsFechas(){ document.getElementById('statsFechaDesde').value=""; document.getElementById('statsFechaHasta').value=""; actualizarEstadisticasConFechas(); }
    function aplicarFiltros(){ fechaDesde=document.getElementById('fechaDesde').value; fechaHasta=document.getElementById('fechaHasta').value; actualizarIndicadoresFiltro(); cargarPedidos(); }
    function limpiarFechas(){ document.getElementById('fechaDesde').value=""; document.getElementById('fechaHasta').value=""; fechaDesde=""; fechaHasta=""; actualizarIndicadoresFiltro(); cargarPedidos(); }
    function actualizarIndicadoresFiltro(){ let cont=document.getElementById('indicadoresFiltro'); if(!cont) return; let ind=[]; if(fechaDesde) ind.push(`📅 Desde: ${formatearFechaLocal(fechaDesde)}`); if(fechaHasta) ind.push(`📅 Hasta: ${formatearFechaLocal(fechaHasta)}`); if(filtroActual!=="todos" && filtroActual!=="eliminados") ind.push(`📌 Estado: ${filtroActual==="Pendiente"?"🕊️ Pendientes":(filtroActual==="En Proceso"?"⚙️ Proceso":"✅ Entregados")}`); if(filtroActual==="eliminados") ind.push(`🗑️ Mostrando ELIMINADOS`); cont.innerHTML=ind.length?ind.map(i=>`<span style="background:#f0ebe5; padding:4px 12px; border-radius:40px;">🔍 ${i}</span>`).join(''):'<span>📋 Mostrando todos activos</span>'; }
    function filtrarPor(estado){ filtroActual=estado; document.getElementById('btnTodos').style.background=estado==='todos'?'#6b8c7a':'#e0d8cf'; document.getElementById('btnPendiente').style.background=estado==='Pendiente'?'#6b8c7a':'#e0d8cf'; document.getElementById('btnProceso').style.background=estado==='En Proceso'?'#6b8c7a':'#e0d8cf'; document.getElementById('btnEntregado').style.background=estado==='Entregado'?'#6b8c7a':'#e0d8cf'; document.getElementById('btnEliminados').style.background=estado==='eliminados'?'#cb887a':'#cdc2b6'; actualizarIndicadoresFiltro(); cargarPedidos(); }
    function escapeHtml(s){ if(!s) return"—"; let d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function mostrarPanel(panel){ document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById(`panel-${panel}`).classList.add('active'); event.target.classList.add('active'); if(panel==='control') cargarPedidos(); }
    async function init(){ await obtenerTasaBCV(); let pedidos=await leerPedidos(); let ult=pedidos.length?Math.max(...pedidos.map(p=>parseInt(p.numero)))+1:1; document.getElementById('numeroPedido').value=ult; await cargarPedidos(); let hoy=new Date(), hace30=new Date(); hace30.setDate(hoy.getDate()-30); document.getElementById('statsFechaDesde').value=hace30.toISOString().split('T')[0]; document.getElementById('statsFechaHasta').value=hoy.toISOString().split('T')[0]; actualizarEstadisticasConFechas(); setInterval(async()=>{ await obtenerTasaBCV(); if(document.getElementById('panel-control').classList.contains('active')) await cargarPedidos(); },300000); }
    init();
</script>
