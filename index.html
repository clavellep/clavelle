<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Clavelle · Gestión de Pedidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f0ea;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Encabezado floral */
        .header {
            background: linear-gradient(135deg, #fff, #fef5ec);
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #f0e4d8;
        }
        .logo h1 {
            color: #4a6f5e;
            font-size: 1.8rem;
        }
        .logo p {
            color: #b8876e;
            font-size: 0.8rem;
        }
        .tasa {
            background: #eae1d6;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab {
            background: #e0d8cf;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab.active {
            background: #6b8c7a;
            color: white;
        }
        
        /* Paneles */
        .panel {
            display: none;
            background: white;
            border-radius: 32px;
            padding: 24px;
        }
        .panel.active { display: block; }
        
        /* Formulario */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .campo label { font-weight: 500; color: #8b735b; font-size: 0.8rem; }
        .campo input, .campo select, .campo textarea {
            padding: 10px 16px;
            border: 1px solid #efe2d6;
            border-radius: 28px;
            font-family: inherit;
        }
        
        /* Botones */
        button {
            background: #6b8c7a;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary { background: #b8876e; width: 100%; padding: 14px; }
        .btn-success { background: #83a67c; }
        .btn-danger { background: #cb887a; }
        .btn-warning { background: #e2bc89; color: #4a3a2a; }
        
        /* Badges */
        .badge-pendiente { background: #ffe6df; color: #bb714c; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        .badge-proceso { background: #fff0e0; color: #c7883c; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        .badge-entregado { background: #e3f3e4; color: #517a3e; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        
        /* Tarjetas */
        .pedido-item {
            background: #fff;
            border: 1px solid #f0e4d8;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .pedido-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .pedido-detalle {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.75rem;
            color: #8f7b66;
            margin-bottom: 12px;
        }
        .pedido-acciones {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid #f0e4d8;
            padding-top: 12px;
        }
        .filtros {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .stat-card {
            background: #fdfbf8;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid #efe2d6;
        }
        .stat-card .numero { font-size: 1.8rem; font-weight: 600; color: #4f6b5c; }
        footer { text-align: center; margin-top: 40px; padding: 16px; color: #cdbcab; font-size: 0.7rem; }
        @media (max-width: 640px) { body { padding: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>🌸 CLAVELLE</h1>
            <p>Gestión floral de pedidos</p>
        </div>
        <div class="tasa">💱 BCV: <strong id="tasaDisplay">Calculando...</strong></div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="mostrarPanel('registro')">📝 Registro</button>
        <button class="tab" onclick="mostrarPanel('control')">🔍 Control</button>
        <button class="tab" onclick="mostrarPanel('estadisticas')">📊 Estadísticas</button>
    </div>
    
    <!-- REGISTRO -->
    <div id="panel-registro" class="panel active">
        <h2>📝 Registrar Pedido</h2>
        <div class="form-grid">
            <div class="campo"><label>📋 Número</label><input type="text" id="numeroPedido" readonly style="background:#f8f2ec;"></div>
            <div class="campo"><label>👤 Cliente *</label><input type="text" id="clienteNombre" placeholder="Nombre"></div>
            <div class="campo"><label>📞 Teléfono</label><input type="text" id="telefono" placeholder="0412-1234567"></div>
            <div class="campo"><label>📦 Descripción *</label><textarea id="descripcion" rows="2"></textarea></div>
            <div class="campo"><label>💰 Monto Bs *</label><input type="number" id="monto" step="0.01"></div>
            <div class="campo"><label>📅 Fecha Entrega</label><input type="date" id="fechaEntrega"></div>
            <div class="campo"><label>⏰ Hora Entrega</label><input type="time" id="horaEntrega"></div>
            <div class="campo"><label>📌 Estado</label>
                <select id="estadoRegistro">
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" onclick="guardarPedido()">💾 GUARDAR</button>
    </div>
    
    <!-- CONTROL -->
    <div id="panel-control" class="panel">
        <h2>🔍 Control de Pedidos</h2>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;">
            <input type="date" id="fechaDesde" placeholder="Desde">
            <input type="date" id="fechaHasta" placeholder="Hasta">
            <button onclick="aplicarFiltros()">🔍 Filtrar</button>
            <button onclick="limpiarFiltros()">🗑️ Limpiar</button>
        </div>
        <div class="filtros">
            <button onclick="filtrarPor('todos')">📋 Todos</button>
            <button onclick="filtrarPor('Pendiente')">🕊️ Pendientes</button>
            <button onclick="filtrarPor('En Proceso')">⚙️ Proceso</button>
            <button onclick="filtrarPor('Entregado')">✅ Entregados</button>
            <button onclick="filtrarPor('eliminados')" id="btnEliminados">🗑️ Eliminados</button>
        </div>
        <div id="listaPedidos">Cargando...</div>
    </div>
    
    <!-- ESTADÍSTICAS -->
    <div id="panel-estadisticas" class="panel">
        <h2>📊 Estadísticas</h2>
        <div id="statsContainer" class="stats-grid">Cargando...</div>
    </div>
    
    <footer>💐 Clavelle · Sincronizado con Google Sheets</footer>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; max-width:500px; width:90%; border-radius:32px; padding:24px;">
        <h3>✏️ Editar Pedido #<span id="editNumero"></span></h3>
        <div class="campo"><label>Cliente</label><input type="text" id="editCliente"></div>
        <div class="campo"><label>Teléfono</label><input type="text" id="editTelefono"></div>
        <div class="campo"><label>Descripción</label><textarea id="editDescripcion" rows="2"></textarea></div>
        <div class="campo"><label>Monto Bs</label><input type="number" id="editMonto" step="0.01"></div>
        <div class="campo"><label>Fecha Entrega</label><input type="date" id="editFechaEntrega"></div>
        <div class="campo"><label>Hora Entrega</label><input type="time" id="editHoraEntrega"></div>
        <div class="campo"><label>Estado</label><select id="editEstado"><option>Pendiente</option><option>En Proceso</option><option>Entregado</option></select></div>
        <div class="campo"><label>Responsable</label><input type="text" id="editResponsable"></div>
        <div style="display:flex; gap:12px; margin-top:20px;"><button onclick="guardarEdicion()">Guardar</button><button onclick="cerrarModal()">Cancelar</button></div>
    </div>
</div>

<script>
    // ===== CONFIGURACIÓN =====
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyq2dLS_vi1wGsk5_8HgEoWt32Pq9AEOwbQ83FeZpDVrdVDALoQM4_SFmb4FQJf6ckQUA/exec";
    const CLAVE = "piliperezbele";
    let USUARIO = "Pili Pérez";
    let pedidosGlobal = [];
    let filtroActual = "todos";
    let fechaDesde = "";
    let fechaHasta = "";
    let tasa = 489.55;
    let editandoNumero = null;
    
    // ===== FUNCIÓN PARA LIMPIAR FECHAS (eliminar zona horaria) =====
    function limpiarFecha(fecha) {
        if (!fecha) return "";
        let f = String(fecha);
        // Si tiene T (formato ISO), tomar solo la parte antes de T
        if (f.includes('T')) {
            return f.split('T')[0];
        }
        return f;
    }
    
    // Funciones auxiliares
    function mostrarNotificacion(msg, error=false) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:${error?'#cb887a':'#6b8c7a'}; color:white; padding:12px 24px; border-radius:40px; z-index:9999;`;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(), 3000);
    }
    
    async function obtenerTasa() {
        try {
            let r = await fetch('https://open.er-api.com/v6/latest/USD');
            let d = await r.json();
            if(d?.rates?.VES) tasa = d.rates.VES;
        } catch(e) {}
        document.getElementById('tasaDisplay').innerText = tasa.toFixed(2);
    }
    
    function jsonp(url) {
        return new Promise((resolve, reject) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (data) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve(data);
            };
            let sep = url.includes('?') ? '&' : '?';
            script.src = `${url}${sep}callback=${cb}`;
            script.onerror = () => { reject(new Error('Network error')); };
            document.body.appendChild(script);
        });
    }
    
    async function leerPedidos() {
        try {
            let url = `${SCRIPT_URL}?action=leer`;
            if (filtroActual === "eliminados") url += `&mostrarEliminados=true`;
            else url += `&mostrarEliminados=false`;
            if (fechaDesde) url += `&fechaDesde=${fechaDesde}`;
            if (fechaHasta) url += `&fechaHasta=${fechaHasta}`;
            let data = await jsonp(url);
            if (data.success && data.pedidos) {
                // Limpiar fechas de los pedidos recibidos
                for (let i = 0; i < data.pedidos.length; i++) {
                    if (data.pedidos[i].fechaRegistro) {
                        data.pedidos[i].fechaRegistro = limpiarFecha(data.pedidos[i].fechaRegistro);
                    }
                    if (data.pedidos[i].fechaEntrega) {
                        data.pedidos[i].fechaEntrega = limpiarFecha(data.pedidos[i].fechaEntrega);
                    }
                }
                return data.pedidos;
            }
            return [];
        } catch(e) {
            mostrarNotificacion("Error de lectura", true);
            return [];
        }
    }
    
    async function guardarPedidoWebApp(pedido) {
        return new Promise((resolve) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (r) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve({ success: r.success === true, error: r.error });
            };
            let params = new URLSearchParams();
            params.append('action', 'guardar');
            params.append('data', JSON.stringify(pedido));
            params.append('callback', cb);
            script.src = `${SCRIPT_URL}?${params.toString()}`;
            document.body.appendChild(script);
        });
    }
    
    async function actualizarPedido(pedido) {
        return new Promise((resolve) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (r) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve({ success: r.success === true, error: r.error });
            };
            let params = new URLSearchParams();
            params.append('action', 'actualizarCompleto');
            params.append('data', JSON.stringify(pedido));
            params.append('usuario', USUARIO);
            params.append('callback', cb);
            script.src = `${SCRIPT_URL}?${params.toString()}`;
            document.body.appendChild(script);
        });
    }
    
    async function eliminarPedido(num, pass) {
        return new Promise((resolve) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (r) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve({ success: r.success === true, error: r.error });
            };
            script.src = `${SCRIPT_URL}?action=eliminar&numero=${num}&password=${encodeURIComponent(pass)}&usuario=${encodeURIComponent(USUARIO)}&callback=${cb}`;
            document.body.appendChild(script);
        });
    }
    
    async function restaurarPedido(num, pass) {
        return new Promise((resolve) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (r) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve({ success: r.success === true, error: r.error });
            };
            script.src = `${SCRIPT_URL}?action=restaurar&numero=${num}&password=${encodeURIComponent(pass)}&usuario=${encodeURIComponent(USUARIO)}&callback=${cb}`;
            document.body.appendChild(script);
        });
    }
    
    async function actualizarEstado(num, estado, responsable) {
        return new Promise((resolve) => {
            let cb = `cb_${Date.now()}`;
            let script = document.createElement('script');
            window[cb] = (r) => {
                delete window[cb];
                document.body.removeChild(script);
                resolve({ success: r.success === true, error: r.error });
            };
            script.src = `${SCRIPT_URL}?action=actualizar&numero=${num}&estado=${encodeURIComponent(estado)}&responsable=${encodeURIComponent(responsable)}&callback=${cb}`;
            document.body.appendChild(script);
        });
    }
    
    // ===== FUNCIONES PRINCIPALES =====
    async function guardarPedido() {
        let cliente = document.getElementById('clienteNombre').value.trim();
        let desc = document.getElementById('descripcion').value.trim();
        let monto = document.getElementById('monto').value;
        if(!cliente || !desc || !monto || isNaN(monto) || parseFloat(monto)<=0) {
            mostrarNotificacion("❌ Complete campos obligatorios", true);
            return;
        }
        let btn = event.target;
        let orig = btn.innerHTML;
        btn.innerHTML = 'Guardando...';
        btn.disabled = true;
        
        let pedidos = await leerPedidos();
        let nuevoNum = pedidos.length ? Math.max(...pedidos.map(p=>parseInt(p.numero)))+1 : 1;
        let montoBs = parseFloat(monto);
        let montoUsd = montoBs / tasa;
        
        // Limpiar fechas antes de guardar
        let fechaEntrega = document.getElementById('fechaEntrega').value;
        let fechaRegistro = new Date().toISOString().split('T')[0];
        
        let data = {
            numero: nuevoNum,
            cliente: cliente,
            telefono: document.getElementById('telefono').value,
            descripcion: desc,
            monto: montoBs.toFixed(2),
            fechaEntrega: fechaEntrega,
            horaEntrega: document.getElementById('horaEntrega').value,
            estado: document.getElementById('estadoRegistro').value,
            clienteDetalle: "",
            responsable: "",
            fechaRegistro: fechaRegistro,
            montoUSD: montoUsd.toFixed(2),
            observaciones: `Creado por ${USUARIO}`
        };
        
        let res = await guardarPedidoWebApp(data);
        btn.innerHTML = orig;
        btn.disabled = false;
        if(res.success) {
            mostrarNotificacion(`✅ Pedido #${nuevoNum} guardado`);
            document.getElementById('clienteNombre').value = "";
            document.getElementById('telefono').value = "";
            document.getElementById('descripcion').value = "";
            document.getElementById('monto').value = "";
            document.getElementById('fechaEntrega').value = "";
            document.getElementById('horaEntrega').value = "";
            document.getElementById('numeroPedido').value = nuevoNum + 1;
            await cargarPedidos();
        } else {
            mostrarNotificacion("❌ Error al guardar", true);
        }
    }
    
    async function cargarPedidos() {
        let container = document.getElementById('listaPedidos');
        container.innerHTML = 'Cargando...';
        
        pedidosGlobal = await leerPedidos();
        if(!pedidosGlobal.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">📭 No hay pedidos</div>';
            actualizarEstadisticas();
            return;
        }
        
        let filtrados = pedidosGlobal;
        if(filtroActual !== "todos" && filtroActual !== "eliminados") {
            filtrados = filtrados.filter(p => p.estado === filtroActual);
        }
        filtrados.sort((a,b)=>b.numero - a.numero);
        
        if(!filtrados.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">📭 No hay pedidos con este filtro</div>';
            actualizarEstadisticas();
            return;
        }
        
        let html = '';
        for(let p of filtrados) {
            let badge = p.estado === "Pendiente" ? "badge-pendiente" : (p.estado === "En Proceso" ? "badge-proceso" : "badge-entregado");
            let esElim = (filtroActual === "eliminados");
            let esEnt = (p.estado === "Entregado");
            
            // Mostrar fechas limpias
            let fechaEntregaMostrar = p.fechaEntrega ? limpiarFecha(p.fechaEntrega) : '—';
            let fechaRegistroMostrar = p.fechaRegistro ? limpiarFecha(p.fechaRegistro) : '—';
            
            html += `
                <div class="pedido-item">
                    <div class="pedido-header">
                        <div><strong>📋 #${p.numero}</strong> <span class="${badge}">${p.estado}</span></div>
                        <div><strong>Bs ${parseFloat(p.monto).toFixed(2)}</strong> <small>($${(parseFloat(p.monto)/tasa).toFixed(2)})</small></div>
                    </div>
                    <div class="pedido-detalle">
                        <div>👤 ${escapeHtml(p.cliente)}</div>
                        <div>📞 ${escapeHtml(p.telefono) || '—'}</div>
                        <div>📦 ${escapeHtml(p.descripcion)}</div>
                        <div>📅 Entrega: ${fechaEntregaMostrar} ${p.horaEntrega || ''}</div>
                        <div>📆 Registro: ${fechaRegistroMostrar}</div>
                        ${p.responsable ? `<div>👤 Responsable: ${escapeHtml(p.responsable)}</div>` : ''}
                    </div>
                    <div class="pedido-acciones">
                        ${!esElim && !esEnt ? `<button class="btn-warning" onclick="abrirEditar(${JSON.stringify(p).replace(/'/g, "\\'")})">✏️ Editar</button>` : ''}
                        ${!esElim && !esEnt ? `<button class="btn-danger" onclick="eliminarPedidoConfirm(${p.numero}, '${escapeHtml(p.cliente)}', '${p.estado}')">🗑️ Eliminar</button>` : ''}
                        ${!esElim && !esEnt ? `<button class="btn-success" onclick="entregarPedido(${p.numero}, this)">✅ Entregar</button>` : ''}
                        ${esElim ? `<button class="btn-success" onclick="restaurarPedidoConfirm(${p.numero}, '${escapeHtml(p.cliente)}')">♻️ Restaurar</button>` : ''}
                        ${esEnt && !esElim ? `<span style="background:#e3f3e4; padding:6px 16px; border-radius:40px;">✅ ENTREGADO</span>` : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        actualizarEstadisticas();
    }
    
    function actualizarEstadisticas() {
        let stats = document.getElementById('statsContainer');
        if(!pedidosGlobal.length) { stats.innerHTML = '<div style="text-align:center">Sin datos</div>'; return; }
        let totalBs = pedidosGlobal.reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
        let pend = pedidosGlobal.filter(p=>p.estado==="Pendiente");
        let proc = pedidosGlobal.filter(p=>p.estado==="En Proceso");
        let ent = pedidosGlobal.filter(p=>p.estado==="Entregado");
        stats.innerHTML = `
            <div class="stat-card"><div class="numero">${pedidosGlobal.length}</div><div>Total pedidos</div><div class="monto">Bs ${totalBs.toFixed(2)}</div></div>
            <div class="stat-card"><div class="numero" style="color:#bb714c">${pend.length}</div><div>Pendientes</div></div>
            <div class="stat-card"><div class="numero" style="color:#c7883c">${proc.length}</div><div>En Proceso</div></div>
            <div class="stat-card"><div class="numero" style="color:#517a3e">${ent.length}</div><div>Entregados</div></div>
        `;
    }
    
    async function entregarPedido(num, btn) {
        let responsable = prompt("✍️ Nombre de quien entrega:");
        if(!responsable) return;
        let orig = btn.innerHTML;
        btn.innerHTML = '⏳';
        btn.disabled = true;
        let res = await actualizarEstado(num, "Entregado", responsable);
        btn.innerHTML = orig;
        btn.disabled = false;
        if(res.success) {
            mostrarNotificacion(`✅ Pedido #${num} entregado por ${responsable}`);
            await cargarPedidos();
        } else {
            mostrarNotificacion("❌ Error", true);
        }
    }
    
    async function eliminarPedidoConfirm(num, cliente, estado) {
        if(estado === "Entregado") { mostrarNotificacion("❌ No se puede eliminar un pedido entregado", true); return; }
        let pass = prompt(`🔐 Contraseña para eliminar pedido #${num}:`);
        if(!pass || pass !== CLAVE) { mostrarNotificacion("❌ Contraseña incorrecta", true); return; }
        if(confirm(`¿Eliminar pedido #${num} de ${cliente}?`)) {
            let res = await eliminarPedido(num, pass);
            if(res.success) {
                mostrarNotificacion(`🗑️ Pedido #${num} eliminado`);
                await cargarPedidos();
            } else {
                mostrarNotificacion("❌ Error", true);
            }
        }
    }
    
    async function restaurarPedidoConfirm(num, cliente) {
        let pass = prompt(`🔐 Contraseña para restaurar pedido #${num}:`);
        if(!pass || pass !== CLAVE) { mostrarNotificacion("❌ Contraseña incorrecta", true); return; }
        if(confirm(`¿Restaurar pedido #${num} de ${cliente}?`)) {
            let res = await restaurarPedido(num, pass);
            if(res.success) {
                mostrarNotificacion(`♻️ Pedido #${num} restaurado`);
                await cargarPedidos();
            } else {
                mostrarNotificacion("❌ Error", true);
            }
        }
    }
    
    function abrirEditar(p) {
        if(p.estado === "Entregado") { mostrarNotificacion("❌ No se puede editar un pedido entregado", true); return; }
        editandoNumero = p.numero;
        document.getElementById('editNumero').innerText = p.numero;
        document.getElementById('editCliente').value = p.cliente || "";
        document.getElementById('editTelefono').value = p.telefono || "";
        document.getElementById('editDescripcion').value = p.descripcion || "";
        document.getElementById('editMonto').value = p.monto || "";
        document.getElementById('editFechaEntrega').value = p.fechaEntrega ? limpiarFecha(p.fechaEntrega) : "";
        document.getElementById('editHoraEntrega').value = p.horaEntrega || "";
        document.getElementById('editEstado').value = p.estado || "Pendiente";
        document.getElementById('editResponsable').value = p.responsable || "";
        document.getElementById('modalEditar').style.display = 'flex';
    }
    
    function cerrarModal() {
        document.getElementById('modalEditar').style.display = 'none';
        editandoNumero = null;
    }
    
    async function guardarEdicion() {
        if(!editandoNumero) return;
        let monto = parseFloat(document.getElementById('editMonto').value) || 0;
        let data = {
            numero: editandoNumero,
            cliente: document.getElementById('editCliente').value,
            telefono: document.getElementById('editTelefono').value,
            descripcion: document.getElementById('editDescripcion').value,
            monto: monto.toFixed(2),
            fechaEntrega: document.getElementById('editFechaEntrega').value,
            horaEntrega: document.getElementById('editHoraEntrega').value,
            estado: document.getElementById('editEstado').value,
            responsable: document.getElementById('editResponsable').value,
            montoUSD: (monto / tasa).toFixed(2)
        };
        let btn = event.target;
        let orig = btn.innerHTML;
        btn.innerHTML = 'Guardando...';
        btn.disabled = true;
        let res = await actualizarPedido(data);
        btn.innerHTML = orig;
        btn.disabled = false;
        if(res.success) {
            mostrarNotificacion(`✅ Pedido #${editandoNumero} actualizado`);
            cerrarModal();
            await cargarPedidos();
        } else {
            mostrarNotificacion("❌ Error: " + res.error, true);
        }
    }
    
    function aplicarFiltros() {
        fechaDesde = document.getElementById('fechaDesde').value;
        fechaHasta = document.getElementById('fechaHasta').value;
        cargarPedidos();
    }
    
    function limpiarFiltros() {
        fechaDesde = "";
        fechaHasta = "";
        document.getElementById('fechaDesde').value = "";
        document.getElementById('fechaHasta').value = "";
        cargarPedidos();
    }
    
    function filtrarPor(estado) {
        filtroActual = estado;
        cargarPedidos();
    }
    
    function escapeHtml(s) { if(!s) return "—"; let d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    
    function mostrarPanel(panel) {
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(`panel-${panel}`).classList.add('active');
        event.target.classList.add('active');
        if(panel === 'control') cargarPedidos();
    }
    
    async function init() {
        await obtenerTasa();
        let pedidos = await leerPedidos();
        let ultimo = pedidos.length ? Math.max(...pedidos.map(p=>parseInt(p.numero)))+1 : 1;
        document.getElementById('numeroPedido').value = ultimo;
        await cargarPedidos();
        setInterval(async()=>{ await obtenerTasa(); if(document.getElementById('panel-control').classList.contains('active')) await cargarPedidos(); }, 300000);
    }
    init();
</script>
</body>
</html>
